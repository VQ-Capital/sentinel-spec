syntax = "proto3";
package sentinel.api.v1;

import "sentinel/execution/v1/execution.proto";
import "sentinel/market/v1/market_data.proto";
import "sentinel/wallet/v1/wallet.proto"; // YENİ: Wallet import edildi

message StreamBundle {
  oneof message {
    sentinel.market.v1.AggTrade trade = 1;
    sentinel.execution.v1.ExecutionReport report = 2;
    sentinel.execution.v1.TradeSignal signal = 3;
    ControlCommand command = 4;
    sentinel.wallet.v1.EquitySnapshot equity = 5;
    sentinel.market.v1.MarketStateVector vector = 6; // ✅ YENİ: Z-Score verisi eklendi
  }
}

message ControlCommand {
  enum CommandType {
    COMMAND_TYPE_UNSPECIFIED = 0;
    COMMAND_TYPE_STOP_ALL = 1;
    COMMAND_TYPE_START_ALL = 2;
  }
  CommandType type = 1;
}
