// ========== DOSYA: sentinel-spec/proto/sentinel/intelligence/v1/intelligence.proto ==========
syntax = "proto3";

// VQ-Capital Intelligence Protocol
// Finansal haberleri ve sosyal medya akışlarını O(1) hızında analiz eden 
// gRPC tabanlı Duygu (Sentiment) Analiz servisinin şemaları.
package sentinel.intelligence.v1;

// SentimentAnalyzerService
// sentinel-intelligence tarafından sunulan gRPC servisidir. 
// Metin alır, finansal duygu skoru döndürür.
service SentimentAnalyzerService {
  // Verilen metni analiz eder.
  rpc AnalyzeText(AnalyzeTextRequest) returns (AnalyzeTextResponse);
}

// AnalyzeTextRequest (İstek)
message AnalyzeTextRequest {
  string text = 1; // Analiz edilecek çiğ haber, tweet veya sinyal metni
}

// AnalyzeTextResponse (Yanıt)
message AnalyzeTextResponse {
  // -1.0 (Kesin Düşüş/Bearish) ile +1.0 (Kesin Yükseliş/Bullish) arasında normalize edilmiş skor
  double score = 1; 
}