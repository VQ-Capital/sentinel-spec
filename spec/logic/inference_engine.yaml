logic:
  id: "QUANT_FUSION_V4_1_OMNISCIENCE"
  objective: "4 Boyutlu (Fiyat Hızı, Tahta Dengesi, NLP Duygu, Zincir Aciliyeti) veri akışını Z_SCALE (10000x) ile kayıpsız normalize edip, Qdrant'ta Cosine Similarity ile anı taraması yapmak."
  
  windowing:
    window_size_sec: "ENV(WINDOW_SIZE_SEC)"         # 30 sn
    min_ticks_per_window: "ENV(MIN_TICKS)"          # 25 Tick
    cosine_similarity_threshold: "ENV(SIMILARITY_THRESHOLD)" # Yuvarlama toleransı (1.01) dahil edilmiştir.

  math:
    vector_dimensions: 4 # [Z_Vel, Z_Imb, Z_Sent, Z_Urg]
    precision_scale: "ENV(Z_SCALE)"                 # Float kayıplarını önlemek için Z-Skoru büyütme (Örn: 10000.0)
    warmup_vectors: "ENV(WARMUP_VECTORS)"           # İstikrarlı z-skor için başlangıç bekleme süresi
    z_score_ema_window: 1000                        # EMA bazlı sürekli varyans hesabı
    
  fusion:
    orderbook_weight: 0.6                           # Tahta (Pasif Emir) baskınlığı
    trade_flow_weight: 0.4                          # Gerçekleşen (Aktif) emir ağırlığı
    sentiment_decay_ms: "ENV(NEWS_DECAY_MS)"        # Haberin etkisini kademeli yitirme süresi (Örn: 4 Saat)
    mempool_urgency_impact: "Ağ tıkanıklığı pre-trade (işlem öncesi) anomali olarak modele dahil edilir."