logic:
  id: "RISK_ENGINE_V3_DYNAMIC_GUARD"
  objective: "Cüzdanı korumak, slipajı (kaymayı) yönetmek ve SLA ihlallerinde sistemi otonom olarak Defansif Moda (Self-Healing) geçirmek."
  
  parameters:
    initial_balance_usd: "ENV(INITIAL_BALANCE)"
    max_drawdown_usd: "ENV(MAX_DRAWDOWN)"
    base_risk_per_trade_pct: "ENV(RISK_PCT)"
    base_leverage: "ENV(LEVERAGE)"
    cooldown_ms: "ENV(COOLDOWN_MS)"
    min_hold_time_ms: "ENV(MIN_HOLD_MS)"

  self_healing_mechanisms:
    defensive_mode_trigger: "Kasa (Equity) %15 erirse VEYA borsada peş peşe 3 kez SLA Timeout yaşanırsa tetiklenir."
    defensive_action: "Riski yarıya indir, kaldıracı düşür, sadece emin olunan (Z > 1.2) sinyallere gir."
    recovery_action: "SLA (Ping) normale dönerse veya PnL toparlarsa normal ayarlara dön."

  sla_watchdog:
    execution_timeout_ms: 50    # Bu sürede borsa API dönmezse işlem düşer (Dropped)
    signal_max_latency_ms: 2000 # Inference'dan çıkan sinyal 2 saniyeden eskiyse çöpe atılır (Bayat Sinyal)