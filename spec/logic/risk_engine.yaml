# sentinel-spec/logic/risk_engine.yaml
logic:
  id: "RISK_ENGINE_V2_SELF_HEALING"
  objective: "10 Dolar bakiye ile batmadan, komisyonları yenerek hayatta kalmak ve büyümek."
  
  parameters:
    # Tüm bu değerler artık ENV variable üzerinden dinamik okunacak
    initial_balance_usd: 10.00
    max_drawdown_usd: 5.00
    base_risk_per_trade_pct: 0.20  # Kasanın %20'si
    base_leverage: 20.0            # Daha güvenli 20x kaldıraç
    cooldown_ms: 10000             # 10 saniye işlem arası soğuma
    min_hold_time_ms: 45000        # Anti-whipsaw: Pozisyon en az 45 sn tutulacak

  self_healing_mechanisms:
    defensive_mode_trigger: "Eğer kasa %15 erirse (Drawdown > %15)"
    defensive_action: "Riski yarıya indir (%10), Kaldıracı yarıya indir (10x)"
    recovery_action: "Kasa tekrar %5 kâra geçerse normal ayarlara dön"

  thresholds:
    take_profit_pct: 0.005    # %0.5
    stop_loss_pct: 0.002      # %0.2