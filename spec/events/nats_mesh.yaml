# sentinel-spec/topology/nats_mesh.yaml
mesh:
  streams:
    market_data:
      subjects: ["market.trade.*"]
      publisher: "sentinel-ingest"
      consumers: ["sentinel-storage", "sentinel-inference", "sentinel-execution"]
      payload: "sentinel.market.v1.AggTrade"

    market_states:
      subjects: ["state.vector.*"]
      publisher: "sentinel-inference"
      consumers: ["sentinel-storage"]
      payload: "sentinel.market.v1.MarketStateVector"

    trade_signals:
      subjects: ["signal.trade.*"]
      publisher: "sentinel-inference"
      consumers: ["sentinel-execution"]
      payload: "sentinel.execution.v1.TradeSignal"

    execution_reports:
      subjects: ["execution.report.*"]
      publisher: "sentinel-execution"
      consumers: ["sentinel-storage", "sentinel-api"]
      payload: "sentinel.execution.v1.ExecutionReport"

    system_control:
      subjects: ["control.command"]
      publisher: "sentinel-api"
      consumers: ["sentinel-execution"]
      payload: "sentinel.api.v1.ControlCommand"
    
    wallet_snapshots:
      subjects: ["wallet.equity.snapshot"]
      publisher: "sentinel-wallet"
      consumers: ["sentinel-execution", "sentinel-terminal"]
      payload: "sentinel.wallet.v1.EquitySnapshot"

    raw_news:
      subjects: ["news.raw.{source}"]
      publisher: "sentinel-news-ingest"
      consumers: ["sentinel-intelligence"]
      payload: "sentinel.market.v1.RawNewsEvent"

    semantic_vectors:
      subjects: ["intelligence.news.vector"]
      publisher: "sentinel-intelligence"
      consumers: ["sentinel-inference", "sentinel-storage"]
      payload: "sentinel.intelligence.v1.SemanticVector"      

    market_orderbook:
      subjects: ["market.orderbook.*"]
      publisher: "sentinel-ingest"
      consumers: ["sentinel-inference", "sentinel-storage"]
      payload: "sentinel.market.v1.OrderbookDepth"      