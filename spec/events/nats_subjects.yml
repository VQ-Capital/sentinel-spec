# ========== DOSYA: sentinel-spec/spec/events/nats_subjects.yml ==========
# VQ-Capital NATS Subject Taxonomy
# Tüm servislerin abone olacağı veya yayın yapacağı kanalların (topic) kesin listesi.

streams:
  # 1. HAM VERİ AKIŞI (Ingestor -> Broker -> Storage/Inference)
  market_data:
    description: "Borsalardan gelen normalize edilmiş ham veriler."
    subjects:
      - "market.trade.{exchange}.{symbol}"      # Örn: market.trade.binance.BTCUSDT
      - "market.orderbook.{exchange}.{symbol}"  # Örn: market.orderbook.hyperliquid.ETHUSD

  # 2. ON-CHAIN VERİ AKIŞI (Chain Ingestor -> Broker -> Inference)
  onchain_data:
    description: "Blockchain ağlarından (Mempool) gelen ön-ticaret (Pre-Trade) uyarıları."
    subjects:
      - "chain.urgency.{symbol}"                # Protobuf: ChainUrgencyEvent

  # 3. ÜRETİLMİŞ DURUMLAR (Inference -> Broker -> Storage)
  market_states:
    description: "Sliding window, LLM ve Zincir verisi füzyonu sonrası üretilen durum vektörleri."
    subjects:
      - "state.vector.{symbol}"                 # Protobuf: MarketStateVector

  # 4. İŞLEM SİNYALLERİ (Inference -> Broker -> Execution)
  signals:
    description: "Inference motorundan çıkan al-sat tavsiyeleri ve risk skorları."
    subjects:
      - "signal.trade.{symbol}"                 # Protobuf: TradeSignal

  # 5. SİSTEM DURUMU VE LOGLAR (Tüm Servisler -> Broker -> Infra)
  telemetry:
    description: "Servislerin kalp atışları ve hata logları."
    subjects:
      - "telemetry.heartbeat.{service_name}"
      - "telemetry.error.{service_name}"

  # 6. İSTİHBARAT VERİLERİ (Intelligence -> Broker -> Inference)
  intelligence_data:
    description: "Haber ve sosyal medya analizlerinden gelen duygu skorları."
    subjects:
      - "intelligence.sentiment.{source}"       # Protobuf: SemanticVector

  # 7. MUHASEBE VE VARLIK (Wallet -> Broker -> Execution/API)
  accounting:
    description: "Merkezi Hazine bakiyesi ve mutabakat raporları."
    subjects:
      - "wallet.equity.snapshot"

  # 8. SÖZEL VERİ (News Ingest -> Broker -> Intelligence)
  news_feed:
    description: "Semantik filtrelemeden geçmiş ham haber ve Twitter akışları."
    subjects:
      - "news.raw.{source}"                     # Protobuf: RawNewsEvent