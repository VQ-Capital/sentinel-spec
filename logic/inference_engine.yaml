# sentinel-spec/logic/inference_engine.yaml
logic:
  id: "INFERENCE_V2_COLD_START"
  objective: "Yeterli veri toplanana kadar beklemek, gürültüyü elemek."
  
  parameters:
    window_size_sec: 30       # 30 Saniyelik pencereler (Gürültü filtresi)
    min_ticks_per_window: 25  # Hacimsiz pencereleri yoksay
    warmup_vectors: 50        # DB sıfırlandığında ilk 50 vektörü sadece kaydet, işlem açma
    cosine_similarity_threshold: 0.97 # %97 altı eşleşmeleri reddet